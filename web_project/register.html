<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App - Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Let's get you set up</h1>
      <p class="subtitle">A few details and you're ready to go</p>

      <div id="errorBox" class="error-box" style="display: none;"></div>

      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button class="btn" id="registerBtn">Create Account</button>

      <p class="link-row">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
